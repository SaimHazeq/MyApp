version: "3.9"

services:
  backend:
    build: ./backend
    container_name: acmm-backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: acmm-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
